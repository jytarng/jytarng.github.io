<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇東坡 - 一蓑煙雨任平生</title>
    <style>
        /* 全局設置：引入適合繁體字的書法字體 */
        body {
            margin: 0;
            padding: 0;
            /* 優先使用標楷體 (Windows/Mac 常見)，其次是微軟正黑體，最後是通用襯線體 */
            font-family: "BiauKai", "DFKai-SB", "STKaiti", "Microsoft JhengHei", "Georgia", serif;
            background-color: #f4f1e8; /* 米宣紙色 */
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px; /* 模擬紙紋網格 */
            color: #2b2b2b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 主容器：模擬畫卷或扇面 */
        .container {
            position: relative;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            text-align: center;
            border: 1px solid #dcdcdc;
            /* 頂部和底部的裝飾線 */
            border-top: 4px solid #5d4037;
            border-bottom: 4px solid #5d4037;
        }

        /* 裝飾性印章效果 */
        .container::before {
            content: "東坡";
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border: 2px solid #b22222;
            color: #b22222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            opacity: 0.8;
            transform: rotate(-5deg);
            font-family: "LiSu", "DFXingShu", "STXingkai", serif; /* 隸書或行楷 */
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #1a1a1a;
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
            font-style: italic;
            border-bottom: 1px dashed #aaa;
            display: inline-block;
            padding-bottom: 5px;
        }

        .content {
            font-size: 1.15em;
            line-height: 1.8;
            text-align: justify;
            margin-bottom: 30px;
            text-indent: 2em;
        }

        /* 詩詞部分特殊樣式 */
        .poem-box {
            background-color: rgba(93, 64, 55, 0.05); /* 淡褐色背景 */
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            border-left: 3px solid #b22222; /* 左側紅邊裝飾 */
            text-align: left;
        }

        .poem-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #8b0000;
            text-align: center;
        }

        .poem-content {
            font-size: 1.1em;
            line-height: 2;
            white-space: pre-line; /* 保留換行 */
            color: #333;
        }

        .highlight {
            color: #b22222;
            font-weight: bold;
        }

        footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #777;
        }

        /* 響應式調整 */
        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .container { padding: 20px; width: 85%; }
            .content { text-align: left; text-indent: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>蘇東坡</h1>
        <div class="subtitle">北宋大文豪 · 生活家 · 樂天派</div>

        <div class="content">
            <p>
                蘇軾，字子瞻，號東坡居士。他一生跌宕起伏，卻始終以豁達之心面對風雨。他是千古第一才子，也是熱愛美食、熱愛生活的凡人。無論身處何地，他都能隨遇而安，將苦難釀成詩篇。
            </p>
        </div>

        <div class="poem-box">
            <div class="poem-title">定風波 · 莫聽穿林打葉聲</div>
            <div class="poem-content">
莫聽穿林打葉聲，何妨吟嘯且徐行。
竹杖芒鞋輕勝馬，誰怕？
<span class="highlight">一蓑煙雨任平生</span>。

料峭春風吹酒醒，微冷，
山頭斜照卻相迎。
回首向來蕭瑟處，歸去，
也無風雨也無晴。
            </div>
        </div>

        <footer>
            「人生如逆旅，我亦是行人。」
        </footer>
    </div>

</body>
</html>
